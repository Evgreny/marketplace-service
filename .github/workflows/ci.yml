name: CI                       # имя workflow, видно во вкладке Actions

on:                            # когда запускать
  pull_request:                # на каждый pull request
  push:
    branches: [main]           # и на каждый push в ветку main

jobs:
  test:                        # job №1 — прогнать тесты
    runs-on: ubuntu-latest     # на свежей виртуалке с Ubuntu
    steps:
      - uses: actions/checkout@v4          # забрать код репозитория на виртуалку

      - uses: actions/setup-python@v5      # поставить Python нужной версии
        with:
          python-version: "3.11"
          cache: pip                        # кешировать зависимости между запусками

      - name: Install system deps (LightGBM needs libgomp)
        # та же системная библиотека OpenMP, что и в Dockerfile — без неё LightGBM не импортируется
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Convert owner to lowercase        # Конвертируем имя пользователя в нижний регистр для docker
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER_LOWER}/marketplace-service" >> $GITHUB_ENV    # Записываем имя в GITHUB_ENV

      - uses: actions/checkout@v4
      
      - name: Login to GHCR           # Логинимся в хранилище образов ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Build and push              # Создаем и пушим образ в ghcr.io
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest